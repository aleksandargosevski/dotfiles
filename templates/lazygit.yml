gui:
  showIcons: true
  nerdFontsVersion: 3
  theme:
    activeBorderColor:
      - black
      - bold
    inactiveBorderColor:
      - black
    selectedLineBgColor:
      - black
    selectedRangeBgColor:
      - black

git:
  branchLogCmd: "git log --graph --color=always --date=relative --format='%C(#e3c78a)%h%C(#ff5454)%d%C(reset) - %C(#36c692)(%ad)%C(reset) %s %C(#80a0ff){%an}%C(reset)' {{branchName}} --"
  paging:
    colorArg: always
    pager: delta --dark --paging=never

keybinding:
  commits:
    moveDownCommit: '<c-n>' # move commit down one
    moveUpCommit: '<c-p>' # move commit up one

customCommands:
  - key: 'E'
    context: 'files'
    prompts:
      - type: 'input'
        title: '~/Desktop/{name}.patch'
        key: 'PatchName'
        initialValue: 'staged-changes'
    command: "git diff --cached > ~/Desktop/{{.Form.PatchName}}.patch && echo 'File created at: ~/Desktop/{{.Form.PatchName}}.patch'"
    loadingText: 'Creating patch from staged changes'
    output: popup
